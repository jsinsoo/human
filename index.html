<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>인문학</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

/* 상단 메뉴 */
#top{
    height:32px;
    padding:2px 5px;
    border-bottom:1px solid #ccc;
    background:#f5f5f5;
}

/* 아주 작은 드롭다운 */
#fileSelect{
    width:220px;
    height:24px;
    font-size:12px;
}

/* 본문 */
#main{
    width:100%;
    height:calc(100vh - 32px);
    border:none;
}
</style>
</head>

<body>

<div id="top">
    <select id="fileSelect"
            onchange="loadPage(this.value)">
        <option value="factfulness.html">
            Factfulness
        </option>

        <option value="deus.html">
            Homo Deus
        </option>

        <option value="sapiens.html" selected>
            Sapiens
        </option>

        <option value="thinking.html">
            Thinking, Fast and Slow
        </option>
    </select>
</div>

<iframe
    id="main"
    src="sapiens.html">
</iframe>

<script>
function loadPage(file){
    document.getElementById("main").src = file;
}
</script>

</body>
</html>
