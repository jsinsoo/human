<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>인문학</title>

<style>
html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial, sans-serif;
}

/* 상단 메뉴 */
#top{
    height:32px;
    padding:2px 5px;
    border-bottom:1px solid #ccc;
    background:#f5f5f5;
}

/* 아주 작은 드롭다운 */
#fileSelect{
    width:220px;
    height:24px;
    font-size:12px;
}

/* 본문 */
#main{
    width:100%;
    height:calc(100vh - 32px);
    border:none;
}
</style>
</head>

<body>

<div id="top">
    <select id="fileSelect"
            onchange="loadPage(this.value)">
        <option value="factfulness.html">
            Factfulness
        </option>

        <option value="deus.html">
            Homo Deus
        </option>

        <option value="sapiens.html" selected>
            Sapiens
        </option>

        <option value="thinking.html">
            Thinking, Fast and Slow
        </option>

        <option value="21lessons.html">
            21 Lessons for the 21st Century
        </option>

        <option value="MyLiberationNotes.html">
            My Liberation Notes(나의 해방 일지)
        </option>

        <option value="MyLiberationNotes1.html">
            My Liberation Notes(나의 해방 일지 줄거리)
        </option>        

        <option value="Righteous.html">
            The Righteous Mind
        </option>   

        <option value="Black_Swan.html">
            The Black Swan
        </option>   

        <option value="Antifragile.html">
            Antifragile
        </option>   
       
        <option value="young.html">
            청춘예찬
        </option>  

        <option value="modern.html">
            현대물리학의 갈래
        </option>  
        
        <option value="monte.html">
            몬테 크리스토 백작 python
        </option>      

        <option value="monte_tts.html">
            몬테 크리스토 백작 tts
        </option> 
        
        <option value="youth.html">
            Youth is the Season of Courage.
        </option>  

        <option value="OurHistory.html">
            우리 역사의 Black Swan 20장면
        </option>  
        
        <option value="Korea.html">
            대한민국 근현대사의 Black Swan 20장면
        </option>  

        <option value="Antifragile20.html">
            세계사적인 Antifragile 20장면
        </option> 

        <option value="BlackSwan20.html">
            유사 이래의 Black Swan 20장면
        </option> 
        
    </select>
</div>

<iframe
    id="main"
    src="sapiens.html">
</iframe>

<script>
function loadPage(file){
    document.getElementById("main").src = file;
}
</script>

</body>
</html>
